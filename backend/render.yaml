services:
  # Build service type for Render
  type: web
  name: mini-erp-backend
  env: docker
  dockerfilePath: ./Dockerfile
  dockerContext: .
  plan: free
  region: oregon
  branch: main
  healthCheckPath: /api/health
  envVars:
    - key: APP_ENV
      value: prod
    - key: APP_SECRET
      generateValue: true
    - key: DATABASE_URL
      fromDatabase:
        name: mini-erp-db
        property: connectionString
